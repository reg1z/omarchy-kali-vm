# Kali VM: tell remote-viewer it's fullscreen while Hyprland keeps the
# window tiled normally.
windowrule = fullscreen_state 0 2, match:class remote-viewer, match:title ^Kali VM.*
windowrule = tag -default-opacity, match:class remote-viewer, match:title ^Kali VM.*
windowrule = opacity 1 1, match:class remote-viewer, match:title ^Kali VM.*
